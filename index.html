<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Booster</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Memory Booster</h1>
    <p>Improve your memory</p>
    <div class="menu">
      <button onclick="startNumberGame()">Number Memory</button>
      <button onclick="startPatternGame()">Pattern Recall</button>
      <button onclick="startWordGame()">Word Test</button>
      <button onclick="startMathGame()">Quick Math Reflex</button>
      <button onclick="startColorGame()">Color Memory</button>
      <button onclick="startReactionGame()">Reaction Test</button>
      <button onclick="startSpotDifferenceGame()">Spot the Difference</button>
      <button onclick="resetProgress()">Reset Progress</button>
      <button onclick="startHardcoreMode()">Hardcore Timer Mode</button>
    </div>
    <div id="stats">
        <h3>Score: <span id="score">0</span></h3>
        <h3>Level: <span id="level">1</span></h3>
        <h3>Streak: <span id="streak">0</span></h3>
        <h3>Time: <span id="timer">60</span></h3>
    </div>
    <div id="gameArea"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
